# debian-vps-bootstrap 設定サンプル（フル版）
# すべての項目を明示した例。`bootstrap.py run -c config.toml` で使う。
#
# パスワードは平文では保存しない:
#   - "prompt"  … run 実行時に対話入力する（推奨）
#   - "$6$..."  … SHA-512 crypt ハッシュを直接指定（無人化したい場合）
#     生成例: openssl passwd -6   /   mkpasswd -m sha-512

# suite / locale / timezone は "auto" で稼働中システムから取得する
# （Debian 以外で動かしている等で取れない場合は既定値にフォールバック）。
[debian]
suite = "auto"                   # auto | trixie | bookworm ...（auto=現在のコードネーム）
arch = "auto"                    # auto | amd64 | arm64
locale = "auto"                  # auto | en_US.UTF-8 | ja_JP.UTF-8 ...
timezone = "auto"                # auto | Asia/Tokyo | Etc/UTC ...
keymap = "us"                    # VPS では基本このまま
mirror_host = "deb.debian.org"
mirror_dir = "/debian"

[target]
disk = "auto"                    # auto で自動検出（/dev/vda → sda → nvme0n1）。実行時に確認あり

# ネットワーク。
#   auto   … run/check 実行時に「稼働中の Linux の IPv4 設定」を読み取り、
#            取得できれば静的設定として焼き込む（取れなければ dhcp にフォールバック）。
#   static … 下の interface/address/... を使う（address は "IP/CIDR" 表記も可）。
#   dhcp   … インストーラに DHCP させる。
[network]
mode = "auto"
interface = ""                   # 空なら自動選択（多くの場合これでよい）
address = ""                     # 例: "203.0.113.10/24" または "203.0.113.10"
netmask = ""                     # address が /CIDR でないとき。例: "255.255.255.0"
gateway = ""                     # 例: "203.0.113.1"
nameservers = []                 # 例: ["1.1.1.1", "8.8.8.8"]（空なら gateway を使う）

[host]
hostname = "debian-vps"

# メインユーザー: SSH は公開鍵のみ。パスワードは VNC/ローカルコンソール救済用。
[user]
name = "admin"
fullname = "Admin User"
password_hash = "prompt"
ssh_authorized_keys = [
  "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEXAMPLEEXAMPLEEXAMPLEEXAMPLE admin@laptop",
]

# 自動化用ユーザー: 初回起動後に「別途」作成。SSH 鍵 + 通常 sudo（パスワード必須）。
[ansible]
enabled = true
name = "ansible"
password_hash = "prompt"
ssh_authorized_keys = [
  "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEXAMPLEEXAMPLEEXAMPLEEXAMPLE ansible@control",
]

# d-i 段で入れる最小パッケージ（standard タスク + これら）。
# openssh-server は外さないこと（外すと再インストール後にログインできなくなる）。
# ansible.enabled = true のときは python3 が自動で追加される（Ansible 管理に必須）。
[packages]
include = ["openssh-server", "sudo", "git", "curl", "ca-certificates", "gnupg", "vim", "tmux"]

# 初回起動後（ネットワーク・apt が動く状態）に一度だけ行う処理。
[firstboot]
docker = true
tailscale = true                 # 導入のみ。tailnet 参加は手動 `tailscale up`
apt_packages = ["htop", "git"]   # 追加で入れたい apt パッケージ
run = [                          # 任意の追加コマンド（順次実行・root）
  "timedatectl set-ntp true",
]

[ssh]
password_authentication = false  # SSH パスワード認証を無効化（鍵のみ）
permit_root_login = false
